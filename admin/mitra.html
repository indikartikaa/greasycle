<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Mitra - Admin Greasycle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#004030', secondary: '#2d6a4f', accent: '#d1e7e0' } } }
        }
    </script>
    <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-gray-50 flex">

    <aside class="w-64 bg-primary min-h-screen p-6 text-white hidden md:block sticky top-0">
        <h2 class="text-2xl font-bold mb-10 flex items-center gap-2"><i class="fas fa-recycle"></i> Greasycle</h2>
        <nav class="space-y-4">
            <a href="dashboard.html" class="block p-3 hover:bg-white/10 rounded-lg text-white/60 transition"><i class="fas fa-th-large mr-2"></i> Dashboard</a>
            <a href="pelanggan.html" class="block p-3 hover:bg-white/10 rounded-lg text-white/60 transition"><i class="fas fa-users mr-2"></i> Pelanggan</a>
            <a href="mitra.html" class="block bg-white/10 p-3 rounded-lg text-white font-semibold"><i class="fas fa-truck mr-2"></i> Mitra</a>
            <a href="penjemputan.html" class="block p-3 hover:bg-white/10 rounded-lg text-white/60 transition"><i class="fas fa-box mr-2"></i> Penjemputan</a>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-bold text-primary">Master Data Mitra</h2>
                <p class="text-sm text-gray-400">Kelola kurir dan wilayah operasional penjemputan.</p>
            </div>
            <button onclick="openModal()" class="bg-primary text-white px-5 py-2 rounded-xl text-sm font-bold shadow-md hover:bg-secondary transition">
                <i class="fas fa-plus mr-2"></i>Tambah Mitra
            </button>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-wrap gap-4 items-center">
            <div class="relative flex-1 min-w-[200px]">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                <input type="text" id="search" placeholder="Cari nama atau wilayah..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-primary" onkeyup="applyFilter()">
            </div>
            <select id="filterStatus" class="p-2 border border-gray-200 rounded-lg text-sm text-gray-500 outline-none" onchange="applyFilter()">
                <option value="">Semua Status</option>
                <option value="Aktif">Aktif</option>
                <option value="Nonaktif">Nonaktif</option>
            </select>
        </div>

        <div class="bg-white rounded-xl shadow-md border overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-50 text-gray-400 uppercase text-[10px] font-bold tracking-widest">
                    <tr>
                        <th class="p-4 border-b">Nama Mitra / Email</th>
                        <th class="p-4 border-b">Wilayah</th>
                        <th class="p-4 border-b">No. Kendaraan</th>
                        <th class="p-4 border-b">Status</th>
                        <th class="p-4 border-b text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-[400px]">
            <h3 class="text-lg font-bold text-primary mb-4" id="modalTitle">Tambah Mitra Baru</h3>
            <div class="space-y-4">
                <input type="text" id="mNama" placeholder="Nama Lengkap" class="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-primary text-sm">
                <input type="email" id="mEmail" placeholder="Email" class="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-primary text-sm">
                <input type="text" id="mWilayah" placeholder="Wilayah (Contoh: Sukolilo)" class="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-primary text-sm">
                <input type="text" id="mKendaraan" placeholder="No. Kendaraan (L 1234 ABC)" class="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-primary text-sm">
                <select id="mStatus" class="w-full p-2.5 border rounded-lg outline-none text-sm">
                    <option value="Aktif">Aktif</option>
                    <option value="Nonaktif">Nonaktif</option>
                </select>
                <div class="flex gap-2 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-2.5 border rounded-lg text-sm">Batal</button>
                    <button onclick="saveData()" class="flex-1 py-2.5 bg-primary text-white rounded-lg text-sm font-bold shadow-lg">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let data = [
            { nama: 'Rizal Aditya', email: 'rizal@greasycle.id', wilayah: 'Sukolilo', kendaraan: 'L 4521 KA', status: 'Aktif' },
            { nama: 'Hendra Wijaya', email: 'hendra@greasycle.id', wilayah: 'Rungkut', kendaraan: 'L 7823 BG', status: 'Aktif' },
            { nama: 'Fajar Nugroho', email: 'fajar@greasycle.id', wilayah: 'Kenjeran', kendaraan: 'L 9901 ZZ', status: 'Nonaktif' }
        ];
        let editIdx = -1;

        function renderTable(items) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = items.length ? items.map((m, idx) => `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="p-4 font-semibold text-gray-700">${m.nama}<br><span class="text-[10px] font-normal text-gray-400 italic">${m.email}</span></td>
                    <td class="p-4 text-gray-500">${m.wilayah}</td>
                    <td class="p-4 font-mono text-gray-400 text-xs">${m.kendaraan}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-[10px] font-bold ${m.status === 'Aktif' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-400'} uppercase">${m.status}</span></td>
                    <td class="p-4 text-center space-x-3">
                        <button onclick="editData(${data.indexOf(m)})" class="text-blue-500 hover:scale-110 transition"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteData(${data.indexOf(m)})" class="text-red-400 hover:scale-110 transition"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="5" class="p-10 text-center text-gray-300">Data tidak ditemukan</td></tr>';
        }

        function applyFilter() {
            const q = document.getElementById('search').value.toLowerCase();
            const s = document.getElementById('filterStatus').value;
            const filtered = data.filter(d => 
                (d.nama.toLowerCase().includes(q) || d.wilayah.toLowerCase().includes(q)) &&
                (!s || d.status === s)
            );
            renderTable(filtered);
        }

        function openModal(idx = -1) {
            editIdx = idx;
            document.getElementById('modalTitle').innerText = idx === -1 ? 'Tambah Mitra Baru' : 'Edit Data Mitra';
            if (idx !== -1) {
                document.getElementById('mNama').value = data[idx].nama;
                document.getElementById('mEmail').value = data[idx].email;
                document.getElementById('mWilayah').value = data[idx].wilayah;
                document.getElementById('mKendaraan').value = data[idx].kendaraan;
                document.getElementById('mStatus').value = data[idx].status;
            } else {
                ['mNama','mEmail','mWilayah','mKendaraan'].forEach(id => document.getElementById(id).value = '');
            }
            document.getElementById('modal').classList.replace('hidden', 'flex');
        }

        function closeModal() { document.getElementById('modal').classList.replace('flex', 'hidden'); }

        function saveData() {
            const nama = document.getElementById('mNama').value;
            if (!nama) return alert("Nama mitra wajib diisi!"); // Requirement: Validasi JS

            const formData = {
                nama: nama,
                email: document.getElementById('mEmail').value,
                wilayah: document.getElementById('mWilayah').value,
                kendaraan: document.getElementById('mKendaraan').value,
                status: document.getElementById('mStatus').value
            };

            if (editIdx === -1) data.unshift(formData);
            else data[editIdx] = formData;

            closeModal();
            renderTable(data);
        }

        function deleteData(idx) {
            if (confirm(`Hapus data mitra ${data[idx].nama}?`)) { // Requirement: Konfirmasi JS
                data.splice(idx, 1);
                renderTable(data);
            }
        }

        renderTable(data);
    </script>
</body>
</html>
