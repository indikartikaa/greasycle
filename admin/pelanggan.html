<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Pelanggan - Admin Greasycle</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#004030',
                        secondary: '#2d6a4f',
                        accent: '#d1e7e0'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>

<body class="bg-gray-50 flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-primary min-h-screen p-6 text-white hidden md:block sticky top-0">
        <h2 class="text-2xl font-bold mb-10 flex items-center gap-2">
            <i class="fas fa-recycle"></i> Greasycle
        </h2>

        <nav class="space-y-4">
            <a href="dashboard.html" class="block p-3 hover:bg-white/10 rounded-lg text-white/60">
                <i class="fas fa-th-large mr-2"></i> Dashboard
            </a>

            <a href="pelanggan.html" class="block bg-white/10 p-3 rounded-lg text-white">
                <i class="fas fa-users mr-2"></i> Pelanggan
            </a>

            <a href="mitra.html" class="block p-3 hover:bg-white/10 rounded-lg text-white/60">
                <i class="fas fa-truck mr-2"></i> Mitra
            </a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-8">

        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-bold text-primary">Data Pelanggan</h2>
                <p class="text-sm text-gray-400">Kelola informasi masyarakat dan pelaku usaha.</p>
            </div>

            <button onclick="openModal()" class="bg-primary text-white px-5 py-2 rounded-xl text-sm font-bold shadow-md hover:bg-secondary transition">
                <i class="fas fa-plus mr-2"></i> Tambah Pelanggan
            </button>
        </div>

        <!-- Filter -->
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-wrap gap-4">
            <div class="relative flex-1 min-w-[200px]">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                <input type="text" id="search" placeholder="Cari nama atau lokasi..."
                    class="w-full pl-10 pr-4 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-primary"
                    onkeyup="applyFilter()">
            </div>

            <select id="filterJenis"
                class="p-2 border rounded-lg text-sm text-gray-500 outline-none"
                onchange="applyFilter()">
                <option value="">Semua Jenis</option>
                <option value="Masyarakat">Masyarakat</option>
                <option value="Pelaku Usaha">Pelaku Usaha</option>
            </select>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-xl shadow-md border overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-50 text-gray-400 uppercase text-[10px] font-bold tracking-widest">
                    <tr>
                        <th class="p-4 border-b">Nama / Email</th>
                        <th class="p-4 border-b">Jenis</th>
                        <th class="p-4 border-b">Lokasi</th>
                        <th class="p-4 border-b text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

    </main>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-96">
            <h3 class="text-lg font-bold text-primary mb-4" id="modalTitle">Tambah Pelanggan</h3>

            <div class="space-y-4">
                <input type="text" id="mNama" placeholder="Nama Lengkap"
                    class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-primary">

                <input type="email" id="mEmail" placeholder="Email"
                    class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-primary">

                <select id="mJenis" class="w-full p-2 border rounded-lg outline-none">
                    <option value="Masyarakat">Masyarakat</option>
                    <option value="Pelaku Usaha">Pelaku Usaha</option>
                </select>

                <input type="text" id="mLokasi" placeholder="Lokasi (Kecamatan)"
                    class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-primary">

                <div class="flex gap-2 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-2 border rounded-lg text-sm">
                        Batal
                    </button>

                    <button onclick="saveData()" class="flex-1 py-2 bg-primary text-white rounded-lg text-sm font-bold">
                        Simpan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script>

        let data = [
            { nama: 'Siti Rahayu', email: 'siti@gmail.com', jenis: 'Masyarakat', lokasi: 'Sukolilo' },
            { nama: 'KFC Manyar', email: 'kfc.manyar@kfc.co.id', jenis: 'Pelaku Usaha', lokasi: 'Manyar' }
        ];

        let editIdx = -1;

        function renderTable(items) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = items.map((p, idx) => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-4">
                        <div class="font-semibold text-gray-700">${p.nama}</div>
                        <div class="text-[10px] text-gray-400">${p.email}</div>
                    </td>

                    <td class="p-4">
                        <span class="px-2 py-1 rounded text-[10px] font-bold
                            ${p.jenis === 'Masyarakat'
                                ? 'bg-accent text-primary'
                                : 'bg-orange-100 text-orange-700'} uppercase">
                            ${p.jenis}
                        </span>
                    </td>

                    <td class="p-4 text-gray-500">${p.lokasi}</td>

                    <td class="p-4 text-center space-x-3">
                        <button onclick="editData(${idx})" class="text-blue-500 text-xs">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteData(${idx})" class="text-red-400 text-xs">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function applyFilter() {
            const q = document.getElementById('search').value.toLowerCase();
            const j = document.getElementById('filterJenis').value;

            const filtered = data.filter(d =>
                (d.nama.toLowerCase().includes(q) || d.lokasi.toLowerCase().includes(q)) &&
                (!j || d.jenis === j)
            );

            renderTable(filtered);
        }

        function openModal(idx = -1) {
            editIdx = idx;

            document.getElementById('modalTitle').innerText =
                idx === -1 ? 'Tambah Pelanggan' : 'Edit Pelanggan';

            if (idx !== -1) {
                document.getElementById('mNama').value = data[idx].nama;
                document.getElementById('mEmail').value = data[idx].email;
                document.getElementById('mJenis').value = data[idx].jenis;
                document.getElementById('mLokasi').value = data[idx].lokasi;
            } else {
                document.getElementById('mNama').value = '';
                document.getElementById('mEmail').value = '';
                document.getElementById('mLokasi').value = '';
            }

            document.getElementById('modal').classList.replace('hidden', 'flex');
        }

        function closeModal() {
            document.getElementById('modal').classList.replace('flex', 'hidden');
        }

        function saveData() {
            const nama = document.getElementById('mNama').value;

            if (!nama) {
                alert("Nama wajib diisi!");
                return;
            }

            const newData = {
                nama: nama,
                email: document.getElementById('mEmail').value,
                jenis: document.getElementById('mJenis').value,
                lokasi: document.getElementById('mLokasi').value
            };

            if (editIdx === -1) {
                data.push(newData);
            } else {
                data[editIdx] = newData;
            }

            closeModal();
            renderTable(data);
        }

        function deleteData(idx) {
            if (confirm("Hapus pelanggan " + data[idx].nama + "?")) {
                data.splice(idx, 1);
                renderTable(data);
            }
        }

        function editData(idx) {
            openModal(idx);
        }

        renderTable(data);

    </script>

</body>
</html>
