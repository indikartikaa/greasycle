<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Penjemputan - Admin Greasycle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#004030', secondary: '#2d6a4f', accent: '#d1e7e0' } } }
        }
    </script>
</head>
<body class="bg-gray-50 font-['Poppins'] flex">

    <aside class="w-64 bg-primary min-h-screen p-6 text-white hidden md:block sticky top-0">
        <h2 class="text-2xl font-bold mb-10 flex items-center gap-2"><i class="fas fa-recycle"></i> Greasycle</h2>
        <nav class="space-y-4">
            <a href="dashboard.html" class="block p-3 hover:bg-white/10 rounded-lg text-white/60"><i class="fas fa-th-large mr-2"></i> Dashboard</a>
            <a href="pelanggan.html" class="block p-3 hover:bg-white/10 rounded-lg text-white/60"><i class="fas fa-users mr-2"></i> Pelanggan</a>
            <a href="mitra.html" class="block p-3 hover:bg-white/10 rounded-lg text-white/60"><i class="fas fa-truck mr-2"></i> Mitra</a>
            <a href="penjemputan.html" class="block bg-white/10 p-3 rounded-lg text-white"><i class="fas fa-box mr-2"></i> Penjemputan</a>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-primary">Kelola Transaksi Penjemputan</h2>
            <p class="text-sm text-gray-400 italic">Validasi volume aktual dan status transaksi harian.</p>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-wrap gap-4">
            <input type="text" id="search" placeholder="Cari Pelanggan/Mitra..." class="flex-1 p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-primary" onkeyup="applyFilter()">
            <select id="filterStatus" class="p-2 border rounded-lg text-sm text-gray-500" onchange="applyFilter()">
                <option value="">Semua Status</option>
                <option value="Menunggu">Menunggu</option>
                <option value="Dijemput">Dijemput</option>
                <option value="Selesai">Selesai</option>
            </select>
        </div>

        <div class="bg-white rounded-xl shadow-md border overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-50 text-gray-400 uppercase text-[10px] font-bold tracking-widest">
                    <tr>
                        <th class="p-4 border-b">Pelanggan</th>
                        <th class="p-4 border-b">Tgl Request</th>
                        <th class="p-4 border-b">Volume (L)</th>
                        <th class="p-4 border-b">Mitra</th>
                        <th class="p-4 border-b">Status</th>
                        <th class="p-4 border-b text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-96">
            <h3 class="text-lg font-bold text-primary mb-4">Validasi Penjemputan</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">Volume Aktual (Liter)</label>
                    <input type="number" id="mVolume" class="w-full p-2 border rounded-lg mt-1 focus:ring-2 focus:ring-primary outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">Status</label>
                    <select id="mStatus" class="w-full p-2 border rounded-lg mt-1">
                        <option value="Menunggu">Menunggu</option>
                        <option value="Dijemput">Dijemput</option>
                        <option value="Selesai">Selesai</option>
                    </select>
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-2 border rounded-lg text-sm">Batal</button>
                    <button onclick="saveChanges()" class="flex-1 py-2 bg-primary text-white rounded-lg text-sm font-bold">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let data = [
            { id: 1, pelanggan: 'Siti Rahayu', tanggal: '2026-04-01', volume: 3.5, mitra: 'Rizal Aditya', status: 'Menunggu' },
            { id: 2, pelanggan: 'KFC Manyar', tanggal: '2026-03-25', volume: 25, mitra: 'Hendra Wijaya', status: 'Dijemput' }
        ];
        let currentEditIdx = -1;

        function renderTable(items) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = items.map((item, idx) => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-4 font-semibold">${item.pelanggan}</td>
                    <td class="p-4 text-gray-500">${item.tanggal}</td>
                    <td class="p-4 font-bold text-primary">${item.volume} L</td>
                    <td class="p-4 text-gray-500">${item.mitra}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${getStatusClass(item.status)}">${item.status}</span></td>
                    <td class="p-4 text-center">
                        <button onclick="openModal(${idx})" class="text-secondary hover:underline font-bold text-xs"><i class="fas fa-edit"></i> VALIDASI</button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusClass(status) {
            if (status === 'Selesai') return 'bg-green-100 text-green-700';
            if (status === 'Dijemput') return 'bg-blue-100 text-blue-700';
            return 'bg-yellow-100 text-yellow-700';
        }

        function applyFilter() {
            const q = document.getElementById('search').value.toLowerCase();
            const s = document.getElementById('filterStatus').value;
            const filtered = data.filter(d => 
                (d.pelanggan.toLowerCase().includes(q) || d.mitra.toLowerCase().includes(q)) &&
                (!s || d.status === s)
            );
            renderTable(filtered);
        }

        function openModal(idx) {
            currentEditIdx = idx;
            document.getElementById('mVolume').value = data[idx].volume;
            document.getElementById('mStatus').value = data[idx].status;
            document.getElementById('modal').classList.replace('hidden', 'flex');
        }

        function closeModal() {
            document.getElementById('modal').classList.replace('flex', 'hidden');
        }

        function saveChanges() {
            if (confirm("Konfirmasi perubahan data transaksi?")) { // Requirement: Konfirmasi JS
                data[currentEditIdx].volume = document.getElementById('mVolume').value;
                data[currentEditIdx].status = document.getElementById('mStatus').value;
                closeModal();
                renderTable(data);
                alert("Data berhasil diperbarui!");
            }
        }

        renderTable(data);
    </script>
</body>
</html>
