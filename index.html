<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pengguna - Greasycle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#004030',
                        secondary: '#2d6a4f',
                        accent: '#d1e7e0',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-['Poppins']">

<nav class="bg-white flex justify-between items-center py-4 px-[8%] sticky top-0 z-[1000] shadow-sm">
    <a href="index.html" class="text-2xl font-bold text-primary no-underline">Greasycle</a>
    <div class="flex items-center gap-8">
        <ul class="flex list-none gap-6 m-0 p-0 items-center">
            <li><a href="dashboard.html" class="text-primary font-bold border-b-2 border-primary pb-1">Dashboard</a></li>
            <li><a href="setor.html" class="text-[#666] font-medium hover:text-primary">Setor Jelantah</a></li>
            <li><a href="index.html" class="text-red-600 font-medium hover:text-red-800">Logout</a></li>
        </ul>
        <div class="flex items-center gap-2 text-primary">
            <i class="fas fa-user-circle text-2xl"></i>
            <span class="text-sm font-semibold">Indi Kartika</span>
        </div>
    </div>
</nav>

<div class="max-w-6xl mx-auto px-6 py-10">
    <div class="mb-8">
        <h2 class="text-2xl font-bold text-gray-800">Selamat Datang, Indi!</h2>
        <p class="text-gray-600">Berikut adalah ringkasan aktivitas jelantahmu.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
        <div class="bg-white p-8 rounded-xl shadow-sm border-l-8 border-primary">
            <p class="text-gray-500 text-sm uppercase tracking-wider font-semibold">Total Setoran</p>
            <h3 class="text-3xl font-bold text-gray-800 mt-2">0 <span class="text-lg font-normal">Liter</span></h3>
        </div>
        <div class="bg-white p-8 rounded-xl shadow-sm border-l-8 border-secondary">
            <p class="text-gray-500 text-sm uppercase tracking-wider font-semibold">Poin Terkumpul</p>
            <h3 class="text-3xl font-bold text-gray-800 mt-2">0 <span class="text-lg font-normal">Poin</span></h3>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <div class="p-6 bg-gray-50 border-b">
            <h3 class="font-bold text-gray-700">Riwayat Transaksi</h3>
        </div>
        
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-100 text-gray-600 text-sm uppercase">
                        <th class="p-4 border-b">Tanggal</th>
                        <th class="p-4 border-b">Jumlah (L)</th>
                        <th class="p-4 border-b">Poin</th>
                        <th class="p-4 border-b">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" class="p-10 text-center text-gray-400 italic">
                            Belum ada data transaksi. <br>
                            <a href="setor.html" class="text-primary font-bold not-italic hover:underline">Mulai setor sekarang &rarr;</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
